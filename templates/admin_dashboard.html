<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      border-radius: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .card .text-muted {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .card h4 {
      font-weight: 700;
      font-size: 1.8rem;
    }

    .navbar-buttons a {
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-weight: 500;
      transition: 0.2s;
    }

    .navbar-buttons a:hover {
      opacity: 0.9;
    }

    #weeklyChart {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
    }

    .card-gradient {
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      color: #fff;
    }

    .card-gradient h4, .card-gradient .text-muted {
      color: #fff;
    }
    .dashboard-container {
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  border-radius: 12px;
  padding: 20px;
}


  </style>
</head>
<body>
<div class="container my-5">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">Admin Dashboard</h3>
    <div class="d-flex gap-2 navbar-buttons">
      <a class="btn btn-outline-primary" href="/timetable"><i class="fa-solid fa-calendar"></i> Timetable</a>
      <a class="btn btn-outline-secondary" href="/admin_attendance"><i class="fa-solid fa-user-check"></i> Students</a>
      <a class="btn btn-outline-warning" href="/defaulters_page"><i class="fa-solid fa-user-times"></i> Defaulters</a>
      <a class="btn btn-outline-secondary" href="/"><i class="fa-solid fa-arrow-left"></i> Back</a>
      <a class="btn btn-danger" href="/admin/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>
  </div>

  <!-- Stats Cards -->
  <div class="row g-4">
    <div class="col-md-3">
      <div class="card card-gradient p-3 shadow-sm text-center">
        <div class="text-muted">Total Students</div>
        <h4 id="totalStudents">0</h4>
        <i class="fa-solid fa-users fa-2x mt-2"></i>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow-sm text-center">
        <div class="text-muted">Today Present</div>
        <h4 id="todayPresent">0</h4>
        <i class="fa-solid fa-user-check fa-2x mt-2 text-success"></i>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow-sm text-center">
        <div class="text-muted">Total Encodings</div>
        <h4 id="totalEncodings">0</h4>
        <i class="fa-solid fa-database fa-2x mt-2 text-primary"></i>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow-sm text-center">
        <div class="text-muted">Last Update</div>
        <h6 id="lastUpdate">N/A</h6>
        <i class="fa-solid fa-clock fa-2x mt-2 text-warning"></i>
      </div>
    </div>
  </div>

  <!-- Weekly Attendance Chart -->
  <div class="card p-4 shadow-sm mt-5">
    <h5 class="mb-4 fw-bold">Weekly Attendance</h5>
    <canvas id="weeklyChart" height="120"></canvas>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
async function loadStats(){
  // total students + encodings
  const sysRes = await fetch("/system_status");
  const sys = await sysRes.json();

  document.getElementById("totalStudents").innerText = sys.students;
  document.getElementById("totalEncodings").innerText = sys.encodings;
  document.getElementById("lastUpdate").innerText = sys.last_update;

  // today present
  const todayRes = await fetch("/today_attendance");
  const today = await todayRes.json();
  document.getElementById("todayPresent").innerText = today.records.length;

  // weekly chart (last 7 days)
  const statRes = await fetch("/attendance_stats");
  const stats = await statRes.json();

  const last7Dates = stats.dates.slice(-7);
  const last7Counts = stats.counts.slice(-7);

  new Chart(document.getElementById("weeklyChart"), {
    type: "bar",
    data: {
      labels: last7Dates,
      datasets: [{
        label: "Attendance",
        data: last7Counts,
        backgroundColor: 'rgba(37, 117, 252, 0.7)',
        borderRadius: 6,
        barPercentage: 0.6
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        x: { grid: { display: false } },
        y: { beginAtZero: true, ticks: { stepSize: 1 } }
      }
    }
  });
}

loadStats();
</script>
</body>
</html>
