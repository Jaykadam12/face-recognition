<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Digital Attendance Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: url("static/images/bg.png") center/cover no-repeat;
        /*display: flex;                 /* push content as one column 
      justify-content: flex-end;
      align-items: flex-start;*/
      }

      /* Right panel column */
      .right-panel {
        width: 100%;
        max-width: 900px; /* tighter max width */
        padding: 2rem;
        background: rgba(255, 255, 255, 0.1);
        overflow-y: auto; /* scroll if tall */
      }

      /* Navbar gradient */
      .nav-gradient {
        background: linear-gradient(90deg, #0f172a, #3b82f6);
        margin-bottom: 1.5rem;
        border-radius: 0.75rem;
      }

      /* Cards */
      .glass-card {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(6px);
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        transition: transform 0.2s ease;
      }
      .glass-card:hover {
        transform: translateY(-3px);
      }

      /* Progress bar */
      .progress {
        background-color: #e9ecef;
        border-radius: 10px;
      }
      .progress-bar {
        background: linear-gradient(90deg, #3b82f6, #0ea5e9);
        font-weight: 600;
      }

      /* Small screens: center panel */
      @media (max-width: 992px) {
        body {
          justify-content: center;
        }
        .right-panel {
          max-width: 95vw;
        }
      }
    </style>
  </head>
  <body>
    <div class="right-panel">
      <!-- Navbar -->
      <nav
        class="navbar navbar-expand-lg navbar-dark nav-gradient shadow-sm px-3"
      >
        <div class="container-fluid">
          <a class="navbar-brand fw-bold" href="/">Digital Attendance</a>
          <div class="d-flex">
            <a class="btn btn-outline-light me-2" href="/add_student"
              >Add Student</a
            >
            <a class="btn btn-outline-light me-2" href="/mark_attendance"
              >Mark Attendance</a
            >
            <a class="btn btn-outline-light" href="/attendance_record"
              >Records</a
            >
          </div>
        </div>
      </nav>

      <!-- Dashboard Content -->
      <!-- Use .container instead of container-fluid to avoid full-width stretch -->
      <div class="container">
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card p-3 shadow-sm glass-card">
              <h5>Quick Actions</h5>
              <p class="small text-muted">
                Create student entries, capture faces, or start recognition.
              </p>
              <div class="d-grid gap-2">
                {% if session.get("admin_logged_in") %}
                <a href="/admin/dashboard" class="btn btn-primary">Dashboard</a>
                <a href="/admin/logout" class="btn btn-outline-danger"
                  >Logout</a
                >
                {% else %}
                <a href="/admin/login" class="btn btn-dark">Admin Login</a>
                {% endif %}
              </div>
            </div>
          </div>

          <div class="col-lg-8">
            <div class="card p-3 shadow-sm glass-card">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">System Status</h5>
                <button
                  id="refreshStatus"
                  class="btn btn-outline-primary btn-sm"
                >
                  Refresh
                </button>
              </div>
              <div class="mt-3 small">
                <ul class="list-group list-group-flush">
                  <li
                    class="list-group-item bg-transparent d-flex justify-content-between px-0"
                  >
                    <span>Registered Students:</span>
                    <strong id="studentCount">--</strong>
                  </li>
                </ul>
              </div>
            </div>

            <div class="card p-3 shadow-sm mt-4 glass-card">
              <h5 class="mb-3">Today's Attendance</h5>
              <div id="todayAttendance" class="small text-muted">
                Loading...
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="static/js/dashboard.js"></script>
  </body>
  <script>
    async function loadSystemStatus() {
      try {
        const res = await fetch("/system_status");
        const data = await res.json();
        document.getElementById("studentCount").innerText = data.students;
        // document.getElementById("encodingCount").innerText = data.encodings;
        // document.getElementById("lastUpdate").innerText = data.last_update;
      } catch (e) {
        console.error("Failed to load status", e);
      }
    }
    async function loadTodayAttendance() {
      try {
        const res = await fetch("/today_attendance");
        const data = await res.json();
        const container = document.getElementById("todayAttendance");
        container.innerHTML = "";

        if (!data.records || data.records.length === 0) {
          container.innerHTML =
            "<p class='text-center text-muted'>No attendance marked today.</p>";
          return;
        }

        const header = document.createElement("p");
        header.className = "text-muted small mb-2";
        header.textContent = `Present Students: ${data.records.length}`;
        container.appendChild(header);

        const list = document.createElement("ul");
        list.className = "list-group list-group-flush";

        data.records.forEach((r) => {
          const item = document.createElement("li");
          item.className =
            "list-group-item bg-transparent d-flex justify-content-between";
          item.innerHTML = `
        <span><strong>${r.name}</strong></span>
        <span class="text-muted">Roll: ${r.roll}</span>
      `;
          list.appendChild(item);
        });

        container.appendChild(list);
      } catch (e) {
        console.error("Failed to load today's attendance:", e);
      }
    }

    // Load immediately and refresh every 30 seconds
    loadTodayAttendance();
    setInterval(loadTodayAttendance, 30000);

    document
      .getElementById("refreshStatus")
      .addEventListener("click", loadSystemStatus);
    loadSystemStatus(); // auto load on page start
  </script>
</html>
