<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Add Student</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container my-4">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <h4 class="mb-4">Add Student & Capture Face Data</h4>

              <form id="studentForm">
                <div class="row g-3">
                  <!-- Name -->
                  <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input class="form-control" name="name" required />
                  </div>

                  <!-- Roll -->
                  <div class="col-md-3">
                    <label class="form-label">Roll Number</label>
                    <input class="form-control" name="roll" required />
                  </div>

                  <!-- Reg No -->
                  <div class="col-md-3">
                    <label class="form-label">Registration No</label>
                    <input class="form-control" name="reg_no" />
                  </div>

                  <!-- Class -->
                  <div class="col-md-6">
                    <label class="form-label">Class</label>

                    <select class="form-select" name="class" required>
                      <option value="">Select Class</option>
                      <option>SE</option>
                      <option>TE</option>
                      <option>BE</option>
                    </select>
                  </div>

                  <!-- Section -->
                  <div class="col-md-6">
                    <label class="form-label">Section</label>

                    <select class="form-select" name="sec" required>
                      <option value="">Select Section</option>
                      <option>A</option>
                      <option>B</option>
                      <option>C</option>
                    </select>
                  </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                  <button
                    id="saveInfoBtn"
                    type="submit"
                    class="btn btn-primary"
                  >
                    Save Student Info
                  </button>

                  <button
                    id="startCaptureBtn"
                    type="button"
                    class="btn btn-warning"
                    disabled
                  >
                    Start Face Capture
                  </button>

                  <button
                    id="addStudentBtn"
                    type="button"
                    class="btn btn-success"
                    disabled
                  >
                    Upload Faces & Finish
                  </button>
                </div>
              </form>

              <hr class="my-4" />

              <div class="text-center">
                <video
                  id="video"
                  width="560"
                  height="420"
                  autoplay
                  muted
                  style="border-radius: 10px; border: 2px solid #e2e8f0"
                ></video>

                <div class="mt-3">
                  <div id="captureStatus" class="small text-muted">
                    Captured 0 / 10
                  </div>

                  <div class="progress mt-2" style="height: 12px">
                    <div
                      id="progressBar"
                      class="progress-bar bg-success"
                      style="width: 0%"
                    ></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/camera_add_student.js') }}"></script>
  </body>
</html>
